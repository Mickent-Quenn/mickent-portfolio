<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Projects - Mickent Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Poppins', sans-serif; background:#0F172A; color:white; margin:0; padding:0; }
.projects { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:50px; }
.card { background:#1E293B; padding:20px; border-radius:10px; text-align:center; transition:0.3s; }
.card:hover { transform:translateY(-10px); }
.card img { width:100%; border-radius:10px; }
.btn { display:inline-block; margin-top:15px; padding:10px 20px; background:#3B82F6; border-radius:25px; text-decoration:none; color:white; cursor:pointer; }
header { text-align:center; padding:20px; }

/* Modal Styles */
.modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.8); }
.modal-content { background:#1E293B; margin:10% auto; padding:20px; border-radius:10px; width:90%; max-width:600px; position:relative; color:white; }
.close { position:absolute; top:10px; right:20px; font-size:28px; font-weight:bold; color:white; cursor:pointer; }
.modal-content img { width:100%; border-radius:10px; margin-bottom:15px; }
</style>
</head>
<body>

<header>
    <h1>All Projects</h1>
    <a href="index.html" class="btn">Back to Home</a>
</header>

<div class="projects">

    <div class="card">
        <img src="project1.jpg" alt="Portfolio Website">
        <h3>Portfolio Website</h3>
        <p>Personal responsive website showcasing my skills.</p>
        <button class="btn" onclick="openModal('Portfolio Website','project1.jpg','This is my personal portfolio website showcasing skills, projects, and experience.')">View</button>
    </div>

    <div class="card">
        <img src="project2.jpg" alt="Graphic Designs">
        <h3>Graphic Designs</h3>
        <p>Creative layouts using Photoshop and Canva.</p>
        <button class="btn" onclick="openModal('Graphic Designs','project2.jpg','Creative graphic design layouts using Photoshop and Canva.')">View</button>
    </div>

    <div class="card">
        <img src="project3.jpg" alt="Piso WiFi System">
        <h3>Piso WiFi System</h3>
        <p>System with geographical locations of Piso WiFi.</p>
        <button class="btn" onclick="openModal('Piso WiFi System','project3.jpg','A system with geographic locations of Piso WiFi for data tracking.')">View</button>
    </div>

</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modal-title"></h2>
    <img id="modal-img" src="" alt="Project">
    <p id="modal-desc"></p>
  </div>
</div>

<script>
// Open modal
function openModal(title, imgSrc, desc) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-img').src = imgSrc;
    document.getElementById('modal-desc').textContent = desc;
    document.getElementById('modal').style.display = 'block';
}

// Close modal
function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

// Close modal if user clicks outside content
window.onclick = function(event) {
    const modal = document.getElementById('modal');
    if (event.target === modal) {
        modal.style.display = 'none';
    }
}
</script>

</body>
</html>
